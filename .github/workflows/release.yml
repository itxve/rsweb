name: Universal Rust Binary Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build for ${{ matrix.job.os }}
    runs-on: ${{ matrix.job.os }}
    strategy:
      matrix:
        job:
          - os: ubuntu-latest
            artifact: linux
          - os: windows-latest
            artifact: windows
          - os: macos-latest
            artifact: macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Project Name
        id: project
        shell: bash
        run: |
          # 从 Cargo.toml 提取项目名称
          NAME=$(sed -n 's/^name = "\(.*\)"/\1/p' Cargo.toml | head -n1)
          echo "name=$NAME" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Web
        run: |
          cd web
          npm ci || npm install
          npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.job.os == 'macos-latest' && 'x86_64-apple-darwin,aarch64-apple-darwin' || '' }}

      - name: Build binary
        id: build-result
        shell: bash
        run: |
          PROJECT_NAME=${{ steps.project.outputs.name }}

          if [ "${{ matrix.job.os }}" = "macos-latest" ]; then
            cargo build --release --target x86_64-apple-darwin
            cargo build --release --target aarch64-apple-darwin
            mkdir -p target/release
            lipo -create -output target/release/$PROJECT_NAME-universal \
              target/x86_64-apple-darwin/release/$PROJECT_NAME \
              target/aarch64-apple-darwin/release/$PROJECT_NAME
            echo "upload_path=target/release/$PROJECT_NAME-universal" >> $GITHUB_OUTPUT
          else
            cargo build --release
            if [ "${{ matrix.job.os }}" = "windows-latest" ]; then
              echo "upload_path=target/release/$PROJECT_NAME.exe" >> $GITHUB_OUTPUT
            else
              echo "upload_path=target/release/$PROJECT_NAME" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.project.outputs.name }}-${{ matrix.job.artifact }}
          path: ${{ steps.build-result.outputs.upload_path }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
