name: Release

on:
  push:
    tags:
      - "v*"

env:
  PROJECT_NAME: rsweb
  CARGO_BINARY_NAME: rsweb

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: rsweb-linux
            binary: rsweb
          - os: windows-latest
            artifact: rsweb-windows
            binary: rsweb.exe
          - os: macos-latest
            artifact: rsweb-macos
            binary: rsweb-universal

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Web
        run: |
          cd web
          npm i
          npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # 为macOS安装两个目标架构
          targets: ${{ matrix.os == 'macos-latest' && 'x86_64-apple-darwin,aarch64-apple-darwin' || '' }}

      - name: Build for platform
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            # macOS: 构建通用二进制
            echo "Building macOS universal binary..."
            
            # 添加目标架构
            rustup target add x86_64-apple-darwin
            rustup target add aarch64-apple-darwin
            
            # 构建 Intel 版本
            echo "Building Intel (x86_64) version..."
            cargo build --release --target x86_64-apple-darwin
            
            # 构建 Apple Silicon 版本
            echo "Building Apple Silicon (aarch64) version..."
            cargo build --release --target aarch64-apple-darwin
            
            # 合并为通用二进制
            echo "Creating universal binary with lipo..."
            lipo -create \
              -output target/release/${{ env.CARGO_BINARY_NAME }}-universal \
              target/x86_64-apple-darwin/release/${{ env.CARGO_BINARY_NAME }} \
              target/aarch64-apple-darwin/release/${{ env.CARGO_BINARY_NAME }}
            
            # 验证构建结果
            echo "Universal binary created:"
            file target/release/${{ env.CARGO_BINARY_NAME }}-universal
            echo "Architectures:"
            lipo -archs target/release/${{ env.CARGO_BINARY_NAME }}-universal
          else
            # Linux/Windows: 普通构建
            cargo build --release
          fi

      - name: Rename binary for upload
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            # Windows: 确保是 .exe 文件
            cp target/release/${{ env.CARGO_BINARY_NAME }}.exe target/release/${{ matrix.binary }}
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            # macOS: 通用二进制已构建为 -universal 后缀
            # 确保文件存在
            if [ -f "target/release/${{ env.CARGO_BINARY_NAME }}-universal" ]; then
              echo "Found universal binary, renaming..."
              cp target/release/${{ env.CARGO_BINARY_NAME }}-universal target/release/${{ matrix.binary }}
            else
              echo "Error: Universal binary not found!"
              ls -la target/release/
              exit 1
            fi
          else
            # Linux: 直接复制
            cp target/release/${{ env.CARGO_BINARY_NAME }} target/release/${{ matrix.binary }}
          fi

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/release/${{ matrix.binary }}

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: rsweb-*
          merge-multiple: true

      - name: Display structure of downloaded files
        run: |
          echo "Artifacts directory structure:"
          ls -la artifacts/
          echo ""
          echo "File details:"
          for file in artifacts/*; do
            if [ -f "$file" ]; then
              echo "File: $file"
              if [[ "$file" == *.exe ]]; then
                echo "  Type: Windows executable"
              elif file "$file" | grep -q "Mach-O.*universal"; then
                echo "  Type: macOS universal binary (Intel + Apple Silicon)"
              elif file "$file" | grep -q "Mach-O"; then
                echo "  Type: macOS binary"
              elif file "$file" | grep -q "ELF"; then
                echo "  Type: Linux ELF binary"
              fi
              ls -lh "$file"
              echo ""
            fi
          done

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ github.ref_name }}
          body: |
            # Release ${{ github.ref_name }}

            ## 文件说明

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | Linux | `rsweb` | Linux 64位二进制文件 |
            | Windows | `rsweb.exe` | Windows 64位可执行文件 |
            | macOS | `rsweb-universal` | 通用二进制，支持 Intel 和 Apple Silicon 芯片 |

            **注意**: macOS 版本是通用二进制，同时支持 Intel 和 Apple Silicon 芯片。

            ## 更新内容
            ${{ github.event.head_commit.message }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/*
