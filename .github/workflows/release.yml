name: Universal Rust Binary Release

on:
  push:
    tags:
      - "v*"

env:
  PROJECT_NAME: { { project_name } }
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: {{project_name}}-linux
            binary: {{project_name}}
          - os: windows-latest
            artifact: {{project_name}}-windows
            binary: {{project_name}}.exe
          - os: macos-latest
            artifact: {{project_name}}-macos
            binary: {{project_name}}-universal

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Web
        run: |
          cd web
          npm ci || npm install
          npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build binary
        id: build-result
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            # 构建通用二进制 (Universal Binary)
            cargo build --release --target x86_64-apple-darwin
            cargo build --release --target aarch64-apple-darwin
            mkdir -p target/release
            lipo -create -output target/release/${{ matrix.binary }} \
              target/x86_64-apple-darwin/release/${{ env.PROJECT_NAME }} \
              target/aarch64-apple-darwin/release/${{ env.PROJECT_NAME }}
            echo "upload_path=target/release/${{ matrix.binary }}" >> $GITHUB_OUTPUT

          else
            cargo build --release
            echo "upload_path=target/release/${{ matrix.binary }}" >> $GITHUB_OUTPUT
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ steps.build-result.outputs.upload_path }}
          if-no-files-found: error

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build] # 等待所有构建任务完成
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须赋予写入内容的权限才能创建 Release
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/ # 下载到 artifacts 目录下
          pattern: {{project_name}}-* # 匹配所有以 {{project_name}}- 开头的构件
          merge-multiple: true # 将多个构件合并到同一目录

      - name: Display structure of downloaded files
        run: ls -R artifacts/

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ github.ref_name }}
          body: |
            Changelog:
            ${{ github.event.head_commit.message }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/*
