name: Release

on:
  push:
    tags:
      - "v*"

env:
  PROJECT_NAME: rsweb
  CARGO_BINARY_NAME: rsweb

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: rsweb-linux-x86_64
            binary: rsweb-linux-x86_64
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            artifact: rsweb-windows-x86_64
            binary: rsweb-windows-x86_64.exe
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            artifact: rsweb-macos-universal
            binary: rsweb-macos-universal
            # macOS 不指定单个target，而是构建通用二进制

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Web
        run: |
          cd web
          npm i
          npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin # 为macOS安装两个目标

      - name: Add Rust targets for macOS universal build
        if: matrix.os == 'macos-latest'
        run: |
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin

      - name: Build (Linux/Windows)
        if: matrix.os != 'macos-latest'
        run: |
          cargo build --release --target ${{ matrix.target }}
          # 重命名文件
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/${{ env.CARGO_BINARY_NAME }}.exe target/${{ matrix.target }}/release/${{ matrix.binary }}
          else
            cp target/${{ matrix.target }}/release/${{ env.CARGO_BINARY_NAME }} target/${{ matrix.target }}/release/${{ matrix.binary }}
          fi

      - name: Build macOS Universal Binary
        if: matrix.os == 'macos-latest'
        run: |
          # 1. 分别构建两个架构
          echo "Building for x86_64..."
          cargo build --release --target x86_64-apple-darwin

          echo "Building for aarch64..."
          cargo build --release --target aarch64-apple-darwin

          # 2. 创建通用二进制
          echo "Creating universal binary with lipo..."
          lipo -create \
            -output target/release/${{ matrix.binary }} \
            target/x86_64-apple-darwin/release/${{ env.CARGO_BINARY_NAME }} \
            target/aarch64-apple-darwin/release/${{ env.CARGO_BINARY_NAME }}

          # 3. 验证构建结果
          echo "Verifying universal binary..."
          file target/release/${{ matrix.binary }}
          lipo -archs target/release/${{ matrix.binary }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ fromJSON('{"windows-latest": "target/x86_64-pc-windows-msvc/release/", "ubuntu-latest": "target/x86_64-unknown-linux-gnu/release/", "macos-latest": "target/release/"}')[matrix.os] }}${{ matrix.binary }}

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: rsweb-*
          merge-multiple: true

      - name: Display structure of downloaded files
        run: ls -R artifacts/

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## Release ${{ github.ref_name }}

            **macOS 注意**: 此版本包含通用二进制，支持 Intel (x86_64) 和 Apple Silicon (arm64) 芯片。

            Changelog:
            ${{ github.event.head_commit.message }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/*
