[package]
name = "rsweb"
version = "0.1.0"
edition = "2024"

[dependencies]
axum = "0.7"

tokio = { version = "1.0", features = ["full"] }
tower-http = { version = "0.5", features = ["fs", "trace"] }
tracing = "0.1"
tracing-subscriber = "0.3"

# Embed frontend assets into binary (web dashboard)
rust-embed = "8.1"
mime_guess = "2"