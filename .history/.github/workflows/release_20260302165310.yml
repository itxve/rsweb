name: Release

on:
  push:
    tags:
      - "v*"

env:
  PROJECT_NAME: gateway

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: gateway-linux
            binary: gateway
          - os: windows-latest
            artifact: gateway-windows
            binary: gateway.exe
          - os: macos-latest
            artifact: gateway-macos
            binary: gateway

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: matrix.os == 'ubuntu-latest'
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Build Web
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd web
          npm i
          npm run build

      - name: Create web placeholder
        if: matrix.os != 'ubuntu-latest'
        run: |
          mkdir -p web/dist
          echo '<!DOCTYPE html><html><head><title>Gateway</title></head><body><h1>Gateway</h1></body></html>' > web/dist/index.html

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/release/${{ matrix.binary }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/gateway-linux/gateway
            dist/gateway-windows/gateway.exe
            dist/gateway-macos/gateway
          generate_release_notes: true
